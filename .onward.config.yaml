version: 1

sync:
  mode: local
  branch: onward
  repo: null
  worktree_path: .onward/sync

executor:
  command: ./scripts/onward-exec
  args: []
  enabled: true

models:
  default: composer-2
  high: opus-latest
  medium: sonnet-latest
  low: haiku-latest
  split:
  review_1: codex-latest
  review_2:

work:
  sequential_by_default: true

hooks:
  pre_task_shell: []
  pre_chunk_shell: []
  post_task_shell:
    - 'git add -A && git commit -m "onward: ${ONWARD_TASK_ID} — ${ONWARD_TASK_TITLE}" --allow-empty-message || true'
  post_task_markdown:
  post_chunk_markdown:
