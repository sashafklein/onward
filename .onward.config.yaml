version: 1

sync:
  mode: local
  branch: onward
  repo: null
  worktree_path: .onward/sync

executor:
  command: ./scripts/onward-exec
  args: []
  enabled: true

models:
  default: claude-sonnet-4-6
  high: claude-opus-4-6
  medium: claude-sonnet-4-6
  low: claude-haiku-4-6
  split: claude-sonnet-4-6
  review_1: codex-5-3
  review_2:

work:
  sequential_by_default: true
  # max_parallel_tasks: 1  # Dispatch up to N independent tasks concurrently within a chunk.
  #                         # Default 1 (serial). Set to 3+ to enable parallel execution.
  #                         # post_task_shell hooks are serialized to avoid git-commit conflicts.

hooks:
  pre_task_shell: []
  pre_chunk_shell: []
  post_task_shell:
    - 'git add -A && git commit -m "onward: ${ONWARD_TASK_ID} — ${ONWARD_TASK_TITLE}" --allow-empty-message || true'
  post_task_markdown:
  post_chunk_markdown:
